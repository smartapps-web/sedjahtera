<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Billing - CV. Sedjahtera Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.01em; }
        * { border-radius: 0px !important; }
        @media print { .no-print { display: none !important; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; }
        .sticky-panel { position: sticky; top: 60px; max-height: calc(100vh - 80px); overflow-y: auto; }
        table { table-layout: fixed; width: 100%; border-collapse: collapse; }
        th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 8px 10px !important; }
        .col-tgl { width: 70px; }
        .col-mitra { width: 150px; }
        .col-unit { width: 130px; }
        .col-sa { width: 80px; }
        .col-tek { width: 80px; }
        .col-tagihan { width: 100px; }
        .col-status { width: 80px; }
        .col-aksi { width: 160px; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-700">

    <div id="printOptionsModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] hidden flex items-center justify-center no-print p-4">
        <div class="bg-white p-5 shadow-2xl w-full max-w-xs border-t-4 border-slate-900">
            <h3 class="font-bold text-slate-900 uppercase tracking-widest text-[9px] mb-3 border-b pb-2 italic">Opsi Cetak Invoice</h3>
            <div class="space-y-1">
                <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-100 cursor-pointer"><input type="radio" name="printType" value="all" checked><span class="text-[9px] uppercase font-bold">Semua (Jasa & Bahan)</span></label>
                <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-100 cursor-pointer"><input type="radio" name="printType" value="jasa"><span class="text-[9px] uppercase font-bold text-red-600">Hanya Jasa</span></label>
                <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-100 cursor-pointer"><input type="radio" name="printType" value="bahan"><span class="text-[9px] uppercase font-bold text-blue-600">Hanya Bahan</span></label>
                <div class="flex gap-2 pt-3">
                    <button onclick="executePrint()" class="flex-1 bg-slate-900 text-white py-2 text-[9px] font-bold uppercase tracking-widest">PRINT</button>
                    <button onclick="closePrintModal()" class="flex-1 bg-slate-100 text-slate-500 py-2 text-[9px] font-bold uppercase tracking-widest">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center no-print p-4">
        <div class="bg-white p-5 shadow-2xl w-full max-w-md border-t-4 border-blue-600">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-900 uppercase tracking-widest text-[9px] italic underline">Kelola Bengkel & Alamat</h3>
                <button onclick="closeSettings()" class="text-slate-400 font-bold text-xl">&times;</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="newBengkelName" placeholder="NAMA BENGKEL..." class="w-full p-2 bg-slate-50 border border-slate-200 outline-none text-[9px] uppercase font-bold">
                <textarea id="newBengkelAddr" placeholder="ALAMAT LENGKAP..." class="w-full p-2 bg-slate-50 border border-slate-200 outline-none text-[9px] h-16 italic"></textarea>
                <button onclick="addNewBengkel()" class="w-full bg-blue-600 text-white py-2 font-bold text-[9px] uppercase">Tambah Bengkel</button>
                <div class="border-t pt-3">
                    <div id="bengkelListSettings" class="space-y-1 max-h-40 overflow-y-auto pr-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="rekapModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center no-print p-4">
        <div class="bg-white p-5 shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto border-t-4 border-slate-900">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-900 uppercase tracking-widest text-[9px] italic underline">Rekap Tagihan Bulanan</h3>
                <button onclick="closeRekap()" class="text-slate-400 font-bold text-xl">&times;</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                <div><label class="text-[7px] font-bold text-slate-400 uppercase">Mitra</label><select id="rekapBengkel" class="w-full p-1.5 border border-slate-200 text-[9px] font-bold uppercase"></select></div>
                <div><label class="text-[7px] font-bold text-slate-400 uppercase">Dari</label><input type="date" id="rekapStart" class="w-full p-1.5 border border-slate-200 text-[9px]"></div>
                <div><label class="text-[7px] font-bold text-slate-400 uppercase">Sampai</label><input type="date" id="rekapEnd" class="w-full p-1.5 border border-slate-200 text-[9px]"></div>
                <div class="flex items-end"><button onclick="prosesRekap()" class="w-full bg-blue-600 text-white py-2 text-[9px] font-bold uppercase">Tampilkan</button></div>
            </div>
            <div id="hasilRekap" class="hidden">
                <div class="flex gap-2 mb-3">
                    <button onclick="window.print()" class="flex-1 bg-slate-700 text-white py-2 text-[9px] font-bold uppercase tracking-widest">🖨️ Cetak Rekapan</button>
                    <button onclick="generateKwitansi()" class="flex-1 bg-blue-700 text-white py-2 text-[9px] font-bold uppercase tracking-widest shadow-md">🧾 Buat Kwitansi Total</button>
                </div>
                <div class="border border-slate-200 overflow-hidden mb-2">
                    <table class="w-full text-[9px] text-left">
                        <thead class="bg-slate-50 text-slate-400 uppercase text-[7px] font-bold border-b">
                            <tr><th class="p-2">Tgl</th><th class="p-2">No Polisi</th><th class="p-2">Unit</th><th class="p-2">SA</th> <th class="p-2 text-right">Tagihan</th></tr>
                        </thead>
                        <tbody id="rekapTableBody" class="divide-y divide-slate-100 font-bold text-slate-700"></tbody>
                        <tfoot>
                            <tr class="bg-slate-900 text-white font-bold"><td colspan="4" class="p-2 text-right uppercase">Total Periode:</td> <td id="totalTagihanRekap" class="p-2 text-right">Rp 0</td></tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 p-2 no-print shadow-sm sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <img src="file:///C:/Users/cyber.net/Desktop/projek SBM/logo SM.png" class="h-8 grayscale brightness-50">
                <div class="border-l border-slate-200 pl-3">
                    <h1 class="text-[11px] font-bold text-slate-900 uppercase italic leading-none">CV. SEDJAHTERA MOTOR</h1>
                    <p class="text-[7px] text-slate-400 uppercase tracking-[0.2em] mt-0.5 font-bold">Authorized AC Vendor System</p>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="openSettings()" class="border border-slate-200 px-3 py-1.5 text-[8px] font-bold uppercase">⚙️ BENGKEL</button>
                <button onclick="openRekap()" class="border border-slate-200 px-3 py-1.5 text-[8px] font-bold uppercase">📋 REKAPAN</button>
                <div class="flex border-l border-slate-200 ml-2 pl-2 gap-1">
                    <button onclick="exportData()" class="bg-slate-100 px-3 py-1.5 text-[8px] font-bold text-slate-600 hover:bg-slate-200">SAVE</button>
                    <button onclick="document.getElementById('importFile').click()" class="bg-slate-800 px-3 py-1.5 text-[8px] font-bold text-white hover:bg-black">LOAD</button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 no-print min-h-screen">
        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="bg-white p-3 border border-slate-200 border-l-4 border-l-red-500 shadow-sm"><p class="text-[7px] font-bold text-slate-400 uppercase mb-0.5">Piutang</p><h2 id="displayPiutang" class="text-sm font-bold text-red-600">Rp 0</h2></div>
            <div class="bg-white p-3 border border-slate-200 border-l-4 border-l-emerald-600 shadow-sm"><p class="text-[7px] font-bold text-slate-400 uppercase mb-0.5">Lunas</p><h2 id="displayLunas" class="text-sm font-bold text-emerald-600">Rp 0</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
            <div class="lg:col-span-3 sticky-panel no-print">
                <div class="bg-white p-4 border border-slate-200 shadow-sm">
                    <h2 id="formTitle" class="text-[8px] font-bold text-slate-900 uppercase tracking-widest mb-4 border-b pb-1 italic">Input Pengerjaan</h2>
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="space-y-3">
                        <div><label class="text-[7px] font-bold text-slate-400 uppercase">Bengkel Mitra</label><select id="bengkelMitra" class="w-full p-1.5 border border-slate-200 text-[9px] font-bold text-blue-700 uppercase outline-none"></select></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[7px] font-bold text-slate-400 uppercase">No. Polisi</label><input type="text" id="noPol" class="w-full p-1.5 border border-slate-200 uppercase font-bold text-[9px] outline-none"></div>
                            <div><label class="text-[7px] font-bold text-slate-400 uppercase">Unit Mobil</label><input type="text" id="tipeMobil" class="w-full p-1.5 border border-slate-200 uppercase font-bold text-emerald-700 text-[9px] outline-none"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[7px] font-bold text-slate-400 uppercase">SA</label><input type="text" id="sa_name" class="w-full p-1.5 border border-slate-200 uppercase text-[9px] font-medium outline-none"></div>
                            <div><label class="text-[7px] font-bold text-slate-400 uppercase">Teknisi</label><input type="text" id="teknisi" class="w-full p-1.5 border border-slate-200 uppercase text-[9px] font-medium outline-none"></div>
                        </div>
                        <div><label class="text-[7px] font-bold text-slate-400 uppercase">Analisa & Tgl</label><textarea id="keluhan" class="w-full p-1.5 border border-slate-200 text-[9px] h-12 uppercase mb-1 outline-none"></textarea><input type="date" id="tglKerja" class="w-full p-1.5 border border-slate-200 font-bold text-[9px]"></div>
                        <div class="pt-2 border-t border-slate-50"><div id="partList" class="space-y-1 max-h-40 overflow-y-auto pr-1"></div><button onclick="addPartRow()" class="w-full mt-2 py-1 text-[7px] font-bold text-slate-400 border border-dashed border-slate-200 uppercase hover:bg-slate-50">+ Tambah Item</button></div>
                        <div class="pt-4 flex gap-1"><button onclick="saveData()" id="btnSave" class="flex-[3] bg-slate-900 text-white py-2 text-[9px] font-bold uppercase tracking-widest hover:bg-black transition">SIMPAN</button><button onclick="resetForm()" class="flex-1 bg-white border border-slate-200 text-slate-400 py-2 text-[9px] uppercase">X</button></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-3">
                <div class="bg-white p-2 border border-slate-200 shadow-sm flex gap-2 no-print">
                    <select id="filterMitraUtama" onchange="renderTable()" class="w-1/3 p-2 bg-slate-100 text-[10px] font-bold uppercase outline-none border border-transparent focus:border-slate-300">
                        <option value="ALL">-- SEMUA MITRA --</option>
                    </select>
                    <input type="text" id="universalSearch" oninput="debounceRender()" placeholder="CARI DATA..." class="w-2/3 p-2 bg-slate-50 text-[10px] uppercase font-medium border border-transparent outline-none focus:border-slate-200">
                </div>
                <div class="bg-white border border-slate-200 shadow-sm overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-slate-50 text-slate-400 uppercase text-[7px] font-bold tracking-widest border-b">
                            <tr>
                                <th class="col-tgl cursor-pointer hover:text-slate-900" onclick="sortData('tgl')">Tgl <span id="sort-tgl">↓</span></th>
                                <th class="col-mitra cursor-pointer hover:text-slate-900" onclick="sortData('mitra')">Mitra <span id="sort-mitra"></span></th>
                                <th class="col-unit cursor-pointer hover:text-slate-900" onclick="sortData('noPol')">Unit / Plat <span id="sort-noPol"></span></th>
                                <th class="col-sa cursor-pointer hover:text-slate-900" onclick="sortData('sa')">SA <span id="sort-sa"></span></th>
                                <th class="col-tek cursor-pointer hover:text-slate-900" onclick="sortData('teknisi')">Teknisi <span id="sort-teknisi"></span></th>
                                <th class="col-tagihan text-right cursor-pointer hover:text-slate-900" onclick="sortData('total')">Tagihan <span id="sort-total"></span></th>
                                <th class="col-status text-center">Status</th>
                                <th class="col-aksi text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-slate-100 text-[9px] font-bold text-slate-600"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DATA BINDING ---
        const DB_NAME = 'sm_pro_billing_db_final_v5_status';
        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
        let mitraData = JSON.parse(localStorage.getItem('mitra_data_db')) || [];
        
        let currentSortCol = 'tgl';
        let isAsc = false;
        let activeIndex = null;
        let timer;
        let currentFilteredData = [];

        // --- RENDER FUNCTIONS ---
        function renderTable() {
            const table = document.getElementById('historyTable');
            const filterEl = document.getElementById('filterMitraUtama');
            const searchEl = document.getElementById('universalSearch');
            
            if (!table) return;

            const kw = searchEl ? searchEl.value.toUpperCase() : "";
            const filterMitra = filterEl ? filterEl.value : "ALL";
            
            table.innerHTML = "";
            let piutang = 0; let lunas = 0;
            let htmlRows = "";

            const sortedDb = [...db].sort((a, b) => {
                let valA = a[currentSortCol] || "";
                let valB = b[currentSortCol] || "";
                if (typeof valA === 'string') return isAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                return isAsc ? valA - valB : valB - valA;
            });

            sortedDb.forEach(data => {
                const realIdx = db.indexOf(data);
                const isLunas = data.status === 'LUNAS';
                const matchMitra = (filterMitra === "ALL" || data.mitra === filterMitra);
                const matchKW = (data.mitra.includes(kw) || data.noPol.includes(kw) || data.tipe.includes(kw) || (data.sa || "").includes(kw));

                if (matchMitra && matchKW) {
                    if (isLunas) lunas += data.total; else piutang += data.total;
                    const statusClass = isLunas ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-500 border-red-100';
                    
                    htmlRows += `<tr class="hover:bg-slate-50 transition border-b border-slate-50">
                        <td class="col-tgl opacity-40 font-mono text-[8px]">${data.tgl}</td>
                        <td class="col-mitra uppercase text-blue-800 font-bold">${data.mitra}</td>
                        <td class="col-unit">
                            <div class="text-emerald-700 font-bold leading-none">${data.tipe}</div>
                            <div class="text-slate-900 font-bold mt-0.5">${data.noPol}</div>
                        </td>
                        <td class="col-sa uppercase text-slate-400 text-[8px] font-bold">${data.sa || '-'}</td>
                        <td class="col-tek uppercase text-slate-400 text-[8px] font-bold">${data.teknisi || '-'}</td>
                        <td class="col-tagihan text-right font-bold text-slate-900">Rp ${data.total.toLocaleString()}</td>
                        <td class="col-status text-center"><button onclick="toggleStatus(${realIdx})" class="${statusClass} border px-2 py-0.5 text-[7px] font-bold uppercase">${data.status || 'BELUM'}</button></td>
                        <td class="col-aksi text-center">
                            <div class="flex gap-1 justify-center">
                                <button onclick="editData(${realIdx})" class="text-slate-400 hover:text-blue-600 font-bold text-[8px] border px-1">Edit</button>
                                <button onclick="openPrintOptions(${realIdx})" class="bg-slate-800 text-white px-2 py-0.5 text-[7px] font-bold uppercase">Invoice</button>
                                <button onclick="generateKwitansiSatuan(${realIdx})" class="bg-blue-800 text-white px-2 py-0.5 text-[7px] font-bold uppercase shadow-sm">Kwitansi</button>
                                <button onclick="hapusData(${realIdx})" class="text-slate-300 hover:text-red-500 ml-1 text-base">&times;</button>
                            </div>
                        </td>
                    </tr>`;
                }
            });
            table.innerHTML = htmlRows;
            document.getElementById('displayPiutang').innerText = `Rp ${piutang.toLocaleString()}`;
            document.getElementById('displayLunas').innerText = `Rp ${lunas.toLocaleString()}`;
        }

        // --- MITRA MANAGEMENT ---
        function updateMitraSelects() {
            const selects = [document.getElementById('bengkelMitra'), document.getElementById('rekapBengkel'), document.getElementById('filterMitraUtama')];
            selects.forEach(s => { 
                if(!s) return; 
                const cur = s.value;
                s.innerHTML = (s.id === 'filterMitraUtama') ? '<option value="ALL">-- SEMUA MITRA --</option>' : ""; 
                mitraData.forEach(m => { const o = document.createElement('option'); o.value = m.nama; o.innerText = m.nama; s.appendChild(o); }); 
                s.value = cur || (s.id === 'filterMitraUtama' ? 'ALL' : (s.options[0]?.value || ""));
            });
            renderSettingsList();
        }

        function renderSettingsList() {
            const l = document.getElementById('bengkelListSettings'); if(!l) return;
            l.innerHTML = "";
            mitraData.forEach((m, i) => {
                l.innerHTML += `<div class="bg-slate-50 p-2 border border-slate-200 flex justify-between items-center mb-1">
                    <div><span class="text-blue-700 font-bold">${m.nama}</span></div>
                    <button onclick="removeBengkel(${i})" class="text-red-400 font-bold">×</button></div>`;
            });
        }

        function addNewBengkel() {
            const n = document.getElementById('newBengkelName').value.trim().toUpperCase();
            const a = document.getElementById('newBengkelAddr').value.trim();
            if(n && !mitraData.some(m => m.nama === n)) {
                mitraData.push({ nama: n, alamat: a });
                localStorage.setItem('mitra_data_db', JSON.stringify(mitraData));
                updateMitraSelects();
                document.getElementById('newBengkelName').value = "";
                document.getElementById('newBengkelAddr').value = "";
            } else { alert("Nama bengkel kosong atau sudah ada!"); }
        }

        function removeBengkel(i) { if(confirm("Hapus?")) { mitraData.splice(i, 1); localStorage.setItem('mitra_data_db', JSON.stringify(mitraData)); updateMitraSelects(); } }

        // --- UTILS ---
        function sortData(column) {
            if (currentSortCol === column) isAsc = !isAsc; else { currentSortCol = column; isAsc = true; }
            document.querySelectorAll('thead th span').forEach(el => el.innerText = "");
            const icon = document.getElementById(`sort-${column}`);
            if(icon) icon.innerText = isAsc ? " ↑" : " ↓";
            renderTable();
        }
        function debounceRender() { clearTimeout(timer); timer = setTimeout(renderTable, 300); }
        
        function addPartRow(n = '', p = '') {
            const div = document.createElement('div');
            div.className = "flex gap-1 items-center part-item-row";
            div.innerHTML = `<input type="text" placeholder="Item" value="${n}" class="p-name w-2/3 p-1.5 border border-slate-200 uppercase text-[9px] outline-none"><input type="number" placeholder="Rp" value="${p}" class="p-price w-1/3 p-1.5 border border-slate-200 font-bold text-blue-800 text-[9px] outline-none"><button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 text-base">&times;</button>`;
            document.getElementById('partList').appendChild(div);
        }

        function saveData() {
            const nopol = document.getElementById('noPol').value;
            if(!nopol) return alert("No Polisi Wajib!");
            let items = []; let total = 0;
            document.querySelectorAll('.part-item-row').forEach(row => {
                const name = row.querySelector('.p-name').value;
                const price = parseInt(row.querySelector('.p-price').value) || 0;
                if(name) { items.push({ name: name.toUpperCase(), price: price }); total += price; }
            });
            const editIndex = parseInt(document.getElementById('editIndex').value);
            const entry = { id: editIndex === -1 ? `INV-${Date.now().toString().slice(-6)}` : db[editIndex].id, tgl: document.getElementById('tglKerja').value, mitra: document.getElementById('bengkelMitra').value, noPol: nopol.toUpperCase(), tipe: document.getElementById('tipeMobil').value.toUpperCase(), keluhan: document.getElementById('keluhan').value.toUpperCase(), sa: document.getElementById('sa_name').value.toUpperCase(), teknisi: document.getElementById('teknisi').value.toUpperCase(), items: items, total: total, status: editIndex === -1 ? 'BELUM' : db[editIndex].status };
            if(editIndex === -1) db.push(entry); else db[editIndex] = entry;
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            resetForm(); renderTable();
        }

        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('noPol').value = ""; document.getElementById('tipeMobil').value = "";
            document.getElementById('sa_name').value = ""; document.getElementById('teknisi').value = "";
            document.getElementById('keluhan').value = ""; document.getElementById('partList').innerHTML = "";
            addPartRow(); document.getElementById('tglKerja').value = new Date().toISOString().split('T')[0];
            document.getElementById('formTitle').innerText = "Input Pengerjaan";
        }

        function editData(idx) {
            const d = db[idx]; document.getElementById('editIndex').value = idx; 
            document.getElementById('bengkelMitra').value = d.mitra; document.getElementById('noPol').value = d.noPol; 
            document.getElementById('tipeMobil').value = d.tipe; document.getElementById('sa_name').value = d.sa || "";
            document.getElementById('teknisi').value = d.teknisi || ""; document.getElementById('tglKerja').value = d.tgl; 
            document.getElementById('keluhan').value = d.keluhan; document.getElementById('partList').innerHTML = ""; 
            d.items.forEach(it => addPartRow(it.name, it.price)); 
            document.getElementById('formTitle').innerText = "Edit Data " + d.id;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleStatus(idx) { db[idx].status = db[idx].status === 'LUNAS' ? 'BELUM' : 'LUNAS'; localStorage.setItem(DB_NAME, JSON.stringify(db)); renderTable(); }
        function hapusData(idx) { if(confirm("Hapus?")) { db.splice(idx, 1); localStorage.setItem(DB_NAME, JSON.stringify(db)); renderTable(); } }
        function exportData() { const dl = document.createElement('a'); dl.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({db, mitraData})); dl.download = "BACKUP_SM.json"; dl.click(); }

        function prosesRekap() {

            document.getElementById('totalTagihanRekap').innerText = `Rp ${t.toLocaleString()}`;
            document.getElementById('hasilRekap').classList.remove('hidden');
        }
